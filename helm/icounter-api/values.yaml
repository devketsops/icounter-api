environment: staging
replicaCount: 2
containerPort: 3000

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 60
  targetMemory: 75

config:
  nodeEnv: staging
  logLevel: info
  appVersion: "1.0.0"

secrets:
  dbPassword: bW9ja2VkLXBhc3N3b3Jk
  apiKey: bW9ja2VkLWFwaS1rZXk=

securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    capabilities:
      drop:
        - ALL

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}

networkPolicy:
  enabled: true
  ingress:
    fromCIDR:
      - 10.0.0.0/16
  egress:
    dns:
      enabled: true
      namespaceSelector:
        kubernetes.io/metadata.name: kube-system
    allowAllOutbound: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1
